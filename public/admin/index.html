<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>若甫记 · 写作后台</title>
  <link rel="icon" href="/favicon.svg" />
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    /* 只改主题色：默认蓝 → 莫兰迪墨绿 */
    [class*="AppHeader"] { background: #fff !important; }
    a { color: #5C7A6B; }
    a:hover { color: #445C50; }

    /* 主按钮 */
    button[class*="Button"][class*="green"],
    [class*="ToolbarButton"][class*="active"],
    a[href*="/new"] {
      background-color: #5C7A6B !important;
      border-color: #5C7A6B !important;
    }
    button[class*="Button"][class*="green"]:hover,
    a[href*="/new"]:hover {
      background-color: #445C50 !important;
      border-color: #445C50 !important;
    }

    /* 发布按钮 */
    [class*="PublishButton"] button,
    [class*="DropdownButton"] button {
      background-color: #5C7A6B !important;
      border-color: #5C7A6B !important;
    }
    [class*="PublishButton"] button:hover,
    [class*="DropdownButton"] button:hover {
      background-color: #445C50 !important;
      border-color: #445C50 !important;
    }

    /* 侧栏选中 */
    [class*="NavLink"][class*="active"] {
      color: #5C7A6B !important;
      border-left-color: #5C7A6B !important;
    }

    /* 聚焦边框 */
    input:focus, textarea:focus, select:focus {
      border-color: #5C7A6B !important;
      box-shadow: 0 0 0 3px rgba(92,122,107,0.12) !important;
    }
  </style>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    /* 预览区样式：让预览和前台排版一致 */
    CMS.registerPreviewStyle('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400&family=DM+Serif+Display:ital@0;1&family=Lato:wght@300;400&display=swap');
    CMS.registerPreviewStyle([
      "body{font-family:'Lato','Noto Sans SC',sans-serif;color:#444;font-size:1rem;line-height:1.85;max-width:680px;margin:0 auto;padding:32px 24px;}",
      "h1,h2,h3{font-family:'DM Serif Display',serif;color:#1a1a1a;}",
      "h1{font-size:2rem;margin-bottom:24px;}",
      "h2{font-size:1.4rem;margin:2em 0 0.6em;}",
      "h3{font-size:1.1rem;margin:1.6em 0 0.5em;}",
      "blockquote{border-left:2px solid #5C7A6B;padding-left:16px;color:#444;margin:1.2em 0;}",
      "code{background:#EEF2F0;padding:2px 5px;border-radius:3px;font-size:0.88em;}",
      "pre{background:#f4f4f2;padding:16px;border-radius:4px;overflow-x:auto;margin:1.2em 0;}",
      "a{color:#5C7A6B;}",
      "img{max-width:100%;border-radius:4px;}"
    ].join(''), { raw: true });
  </script>
</body>
</html>
