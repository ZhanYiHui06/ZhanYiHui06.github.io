<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>若甫记 · 后台管理</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    /* ═══════════════════════════════════════════
       若甫记 CMS 后台 — 莫兰迪墨绿主题
       与主站 global.css 设计语言完全统一
       ═══════════════════════════════════════════ */
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500&family=Noto+Serif+SC:wght@400;600&family=DM+Serif+Display:ital@0;1&family=Lato:wght@300;400&display=swap');

    /* ── 基础 ── */
    * { box-sizing: border-box; }
    body {
      font-family: 'Lato', 'Noto Sans SC', sans-serif !important;
      background: #f9f9f7 !important;
      color: #1a1a1a !important;
      -webkit-font-smoothing: antialiased;
    }

    /* ══ 顶栏 ══ */
    [class*="AppHeader"],
    header[class*="Header"] {
      background: rgba(249,249,247,0.95) !important;
      backdrop-filter: blur(12px) !important;
      border-bottom: 1px solid #e8e8e8 !important;
      box-shadow: none !important;
      padding: 0 24px !important;
    }

    /* 站点名 → 若甫记斜体 */
    [class*="AppHeaderSiteLink"],
    [class*="AppHeader"] a:first-of-type,
    header a[href="/"] {
      font-family: 'DM Serif Display', 'Noto Serif SC', serif !important;
      font-style: italic !important;
      font-size: 1.15rem !important;
      color: #1a1a1a !important;
      letter-spacing: 0.01em !important;
      text-decoration: none !important;
    }

    /* 顶栏链接 */
    [class*="AppHeaderNavLink"],
    [class*="AppHeader"] nav a {
      font-size: 0.78rem !important;
      letter-spacing: 0.06em !important;
      color: #888 !important;
      transition: color 0.2s !important;
      text-decoration: none !important;
    }
    [class*="AppHeaderNavLink"]:hover,
    [class*="AppHeader"] nav a:hover {
      color: #1a1a1a !important;
    }

    /* ══ 隐藏 Quick Add ══ */
    [class*="QuickAdd"],
    [class*="quickAdd"],
    button[class*="AppHeaderQuickNewButton"],
    [class*="AppHeader"] [class*="Dropdown"]:not([class*="SettingsDropdown"]),
    [class*="AppHeader"] > div > div:nth-child(2) button:not([class*="Avatar"]):not([class*="Settings"]) {
      display: none !important;
    }

    /* ══ 链接全局色 ══ */
    a { color: #5C7A6B !important; text-decoration: none; }
    a:hover { color: #445C50 !important; }

    /* ══ 侧栏 ══ */
    [class*="Sidebar"], aside {
      background: #fff !important;
      border-right: 1px solid #e8e8e8 !important;
    }
    [class*="SidebarHeading"], [class*="Sidebar"] h2 {
      font-family: 'DM Serif Display', serif !important;
      font-size: 1.1rem !important;
      color: #1a1a1a !important;
    }
    [class*="SidebarNavLink"] a, [class*="Sidebar"] li a {
      font-size: 0.82rem !important;
      color: #888 !important;
      transition: all 0.2s !important;
      border-left: 2px solid transparent !important;
      padding: 8px 16px !important;
    }
    [class*="SidebarNavLink"][class*="active"] a,
    [class*="Sidebar"] li.active a,
    [class*="Sidebar"] li a:hover {
      color: #5C7A6B !important;
      border-left-color: #5C7A6B !important;
      background: #EEF2F0 !important;
    }

    /* 搜索框 */
    [class*="Sidebar"] input, [class*="SearchInput"] {
      border: 1px solid #e8e8e8 !important;
      border-radius: 6px !important;
      font-size: 0.82rem !important;
      padding: 8px 12px !important;
      background: #f9f9f7 !important;
    }
    [class*="Sidebar"] input:focus, [class*="SearchInput"]:focus {
      border-color: #5C7A6B !important;
      box-shadow: 0 0 0 3px rgba(92,122,107,0.1) !important;
      outline: none !important;
    }

    /* ══ 内容区 ══ */
    [class*="CollectionTop"], [class*="ViewControls"] {
      border-bottom: 1px solid #e8e8e8 !important;
    }
    [class*="CollectionLabel"], main h1, main h2 {
      font-family: 'DM Serif Display', 'Noto Serif SC', serif !important;
      color: #1a1a1a !important;
    }
    [class*="SortControl"], [class*="ViewStyle"] {
      font-size: 0.72rem !important;
      color: #bbb !important;
    }

    /* ══ 文章列表卡片 ══ */
    [class*="ListCard"], [class*="ListCardLink"] {
      border: 1px solid #e8e8e8 !important;
      border-radius: 0 !important;
      background: #fff !important;
      transition: all 0.15s !important;
      padding: 16px 20px !important;
    }
    [class*="ListCard"]:hover, [class*="ListCardLink"]:hover {
      border-color: #5C7A6B !important;
      background: #EEF2F0 !important;
    }
    [class*="ListCardTitle"], [class*="ListCard"] h2 {
      font-family: 'DM Serif Display', 'Noto Serif SC', serif !important;
      font-size: 1rem !important;
      color: #1a1a1a !important;
    }

    /* ══ 按钮系统 ══ */
    /* 主按钮 */
    [class*="ToolbarButton"],
    button[class*="ButtonGreen"],
    button[class*="Button-green"],
    [class*="PublishButton"] button,
    a[href*="/new"],
    [class*="CreateNew"] {
      background: #5C7A6B !important;
      border: 1px solid #5C7A6B !important;
      color: #fff !important;
      border-radius: 0 !important;
      padding: 8px 18px !important;
      font-size: 0.78rem !important;
      font-family: 'Lato', 'Noto Sans SC', sans-serif !important;
      letter-spacing: 0.04em !important;
      cursor: pointer !important;
      transition: background 0.2s !important;
      box-shadow: none !important;
    }
    [class*="ToolbarButton"]:hover,
    button[class*="ButtonGreen"]:hover,
    button[class*="Button-green"]:hover,
    [class*="PublishButton"] button:hover,
    a[href*="/new"]:hover,
    [class*="CreateNew"]:hover {
      background: #445C50 !important;
      border-color: #445C50 !important;
    }

    /* 次要按钮 */
    button[class*="Button-gray"],
    button[class*="DeleteButton"] {
      background: #fff !important;
      border: 1px solid #e8e8e8 !important;
      color: #444 !important;
      border-radius: 0 !important;
      padding: 8px 18px !important;
      font-size: 0.78rem !important;
      font-family: 'Lato', 'Noto Sans SC', sans-serif !important;
      cursor: pointer !important;
      transition: all 0.2s !important;
      box-shadow: none !important;
    }
    button[class*="Button-gray"]:hover, button[class*="DeleteButton"]:hover {
      border-color: #5C7A6B !important;
      color: #5C7A6B !important;
    }

    /* 下拉按钮 & 面板 */
    [class*="DropdownButton"] button {
      background: #5C7A6B !important;
      border: 1px solid #5C7A6B !important;
      color: #fff !important;
      border-radius: 0 !important;
      font-size: 0.78rem !important;
      box-shadow: none !important;
    }
    [class*="DropdownButton"] button:hover { background: #445C50 !important; }
    [class*="DropdownList"], ul[role="listbox"] {
      border: 1px solid #e8e8e8 !important;
      border-radius: 4px !important;
      box-shadow: 0 4px 16px rgba(0,0,0,0.06) !important;
      background: #fff !important;
    }
    [class*="DropdownItem"], li[role="option"] {
      font-size: 0.82rem !important;
      padding: 8px 16px !important;
      color: #444 !important;
    }
    [class*="DropdownItem"]:hover, li[role="option"]:hover {
      background: #EEF2F0 !important;
      color: #5C7A6B !important;
    }

    /* ══ Markdown 编辑器工具栏 ══ */
    [class*="ToolbarToggle"],
    [class*="EditorToolbar"],
    [class*="editor-toolbar"] {
      background: #fff !important;
      border: 1px solid #e8e8e8 !important;
      border-bottom: none !important;
      padding: 4px 6px !important;
    }

    /* 工具栏每个按钮 */
    [class*="ToolbarToggle"] button,
    [class*="EditorToolbar"] button,
    [class*="MarkdownControl"] [class*="Toolbar"] button,
    [class*="editor-toolbar"] button {
      background: transparent !important;
      border: 1px solid transparent !important;
      color: #888 !important;
      border-radius: 4px !important;
      padding: 4px 7px !important;
      margin: 0 1px !important;
      min-width: 28px !important;
      height: 28px !important;
      cursor: pointer !important;
      transition: all 0.15s !important;
      box-shadow: none !important;
      display: inline-flex !important;
      align-items: center !important;
      justify-content: center !important;
    }
    [class*="ToolbarToggle"] button:hover,
    [class*="EditorToolbar"] button:hover,
    [class*="MarkdownControl"] [class*="Toolbar"] button:hover,
    [class*="editor-toolbar"] button:hover {
      background: #EEF2F0 !important;
      border-color: #e8e8e8 !important;
      color: #5C7A6B !important;
    }
    [class*="ToolbarToggle"] button[class*="active"],
    [class*="EditorToolbar"] button[class*="active"] {
      background: #EEF2F0 !important;
      color: #5C7A6B !important;
      border-color: #5C7A6B !important;
    }

    /* 工具栏图标 */
    [class*="ToolbarToggle"] svg,
    [class*="EditorToolbar"] svg,
    [class*="MarkdownControl"] [class*="Toolbar"] svg {
      width: 15px !important;
      height: 15px !important;
      fill: currentColor !important;
    }

    /* 富文本 / Markdown 模式切换 */
    [class*="FormatTab"],
    [class*="ModeToggle"] button,
    [class*="EditorToggle"] button {
      font-size: 0.72rem !important;
      letter-spacing: 0.06em !important;
      color: #bbb !important;
      border: none !important;
      background: none !important;
      cursor: pointer !important;
      padding: 6px 12px !important;
    }
    [class*="FormatTab"][class*="active"],
    [class*="ModeToggle"] button[class*="active"],
    [class*="EditorToggle"] button[class*="active"] {
      color: #5C7A6B !important;
      border-bottom: 2px solid #5C7A6B !important;
    }

    /* 编辑器文本区 */
    [class*="RawEditor"],
    [class*="VisualEditor"],
    [data-slate-editor],
    [class*="ControlPaneContainer"] textarea {
      font-family: 'Lato', 'Noto Sans SC', sans-serif !important;
      font-size: 0.95rem !important;
      line-height: 1.85 !important;
      color: #1a1a1a !important;
      border: 1px solid #e8e8e8 !important;
      padding: 20px !important;
      background: #fff !important;
    }

    /* ══ 表单 ══ */
    [class*="ControlPaneContainer"] input,
    [class*="ControlPaneContainer"] select,
    [class*="ControlPaneContainer"] textarea,
    [class*="Widget"] input,
    [class*="Widget"] select {
      border: 1px solid #e8e8e8 !important;
      border-radius: 4px !important;
      padding: 10px 14px !important;
      font-size: 0.88rem !important;
      font-family: 'Lato', 'Noto Sans SC', sans-serif !important;
      color: #1a1a1a !important;
      background: #fff !important;
      transition: border-color 0.2s !important;
      box-shadow: none !important;
    }
    [class*="ControlPaneContainer"] input:focus,
    [class*="ControlPaneContainer"] select:focus,
    [class*="ControlPaneContainer"] textarea:focus,
    [class*="Widget"] input:focus,
    [class*="Widget"] select:focus {
      border-color: #5C7A6B !important;
      box-shadow: 0 0 0 3px rgba(92,122,107,0.1) !important;
      outline: none !important;
    }

    /* 字段标签 */
    [class*="ControlLabel"], [class*="FieldLabel"], label[class*="Label"] {
      font-size: 0.72rem !important;
      letter-spacing: 0.1em !important;
      text-transform: uppercase !important;
      color: #888 !important;
      font-weight: 400 !important;
      margin-bottom: 6px !important;
    }

    /* 提示 */
    [class*="ControlHint"] {
      font-size: 0.72rem !important;
      color: #bbb !important;
      font-weight: 300 !important;
    }

    /* ══ 标签徽章 ══ */
    [class*="Tag"], [class*="Badge"] {
      background: #EEF2F0 !important;
      color: #5C7A6B !important;
      border: 1px solid rgba(92,122,107,0.3) !important;
      border-radius: 20px !important;
      padding: 3px 12px !important;
      font-size: 0.68rem !important;
    }

    /* ══ Tab ══ */
    [role="tab"] { font-size: 0.78rem !important; color: #888 !important; }
    [role="tab"][aria-selected="true"] {
      color: #5C7A6B !important;
      border-bottom-color: #5C7A6B !important;
    }

    /* ══ 通知 ══ */
    [class*="Notification"], [class*="Toast"] {
      border-radius: 4px !important;
      font-size: 0.82rem !important;
      font-family: 'Lato', 'Noto Sans SC', sans-serif !important;
    }
    [class*="NotificationSuccess"], [class*="Toast"][class*="success"] {
      background: #5C7A6B !important;
      color: #fff !important;
    }

    /* ══ 对话框 ══ */
    [class*="Dialog"], [class*="Modal"] {
      border-radius: 6px !important;
      box-shadow: 0 8px 32px rgba(0,0,0,0.1) !important;
      border: 1px solid #e8e8e8 !important;
    }

    /* ══ 加载 ══ */
    [class*="Loader"], [class*="Spinner"] {
      border-color: #EEF2F0 !important;
      border-top-color: #5C7A6B !important;
    }
  </style>
</head>
